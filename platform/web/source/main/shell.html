<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tetris WASM</title>
  <style>
    body { margin: 0; background:#0d0f15; color:#e7ebf3; font-family: system-ui, sans-serif; }
    .wrap { display:flex; gap:18px; padding:16px; align-items:flex-start; }
    .panel { display:flex; flex-direction:column; gap:10px; min-width:180px; }
    canvas { background:#000; image-rendering: pixelated; border:1px solid #2a2f3a; }
    .stat { display:flex; justify-content:space-between; gap:12px; }
    .btnrow { display:flex; gap:8px; }
    button { padding:8px 10px; border-radius:8px; border:1px solid #394255; background:#1a2030; color:#e7ebf3; cursor:pointer; }
    button:hover { background:#242d43; }
    .help { font-size: 12px; opacity: 0.85; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <canvas id="game" width="220" height="484"></canvas>
    </div>

    <div class="panel">
      <div class="stat"><div>TIME</div><div id="timer">0</div></div>
      <div class="stat"><div>SCORE</div><div id="score">0</div></div>
      <div class="stat"><div>LEVEL</div><div id="level">1</div></div>

      <div class="btnrow">
        <button id="btnStart">Start</button>
        <button id="btnReset">Reset</button>
      </div>

      <div class="help">
        A/D: СТПь РЬЕП<br/>
        S: МвЧСЦЎ ЕхЗг<br/>
        E/Q: ШИРќ<br/>
        F ЖЧДТ Space: ЧЯЕх ЕхЗг<br/>
        W: ШІЕх
      </div>
    </div>
  </div>

  <script>
    var Module = {
      onRuntimeInitialized: function() {}
    };
  </script>

  {{{ SCRIPT }}}

  <script type="module">
    import { attachRendererToModule } from "./renderer.js";

    const prevInit = Module.onRuntimeInitialized;
    Module.onRuntimeInitialized = function () {
      if (prevInit) prevInit();
      attachRendererToModule(Module);
    };

    document.getElementById("btnStart").addEventListener("click", () => {
      if (Module.ccall) Module.ccall("game_start", null, [], []);
    });

    document.getElementById("btnReset").addEventListener("click", () => {
      if (Module.ccall) Module.ccall("game_reset", null, [], []);
    });
  </script>
</body>
</html>
